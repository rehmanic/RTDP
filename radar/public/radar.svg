<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Radar pulse effect rings -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#2a3b5c" stroke-width="2" stroke-dasharray="4 4"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#334771" stroke-width="2"/>
  <circle cx="50" cy="50" r="20" fill="none" stroke="#3e5990" stroke-width="2"/>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#5073be" stroke-width="2"/>
  
  <!-- Radar sweep scanner effect -->
  <path d="M50 50 L50 10 A40 40 0 0 1 85 30 Z" fill="rgba(64, 224, 208, 0.3)"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#40e0d0"/>
  
  <!-- Weather Blips -->
  <!-- Storm (Red) -->
  <circle cx="65" cy="35" r="3" fill="#ff4d4f">
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
